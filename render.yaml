services:
  - type: web
    name: socialbuddy-backend
    runtime: java
    rootDir: backend

    buildCommand: mvn clean package -DskipTests

    startCommand: java -jar target/social-analyzer-0.0.1-SNAPSHOT.jar

    envVars:
      - key: GEMINI_API_KEY
        sync: false

      - key: OCR_SPACE_API_KEY
        sync: false

  - type: web
    name: socialbuddy-frontend

    runtime: node

    rootDir: frontend

    buildCommand: npm install && npm run build

    startCommand: npm run preview